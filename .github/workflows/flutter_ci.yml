name: LingoBreeze Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd flutter-app
          flutter pub get

      - name: Verify formatting
        run: |
          cd flutter-app
          dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: |
          cd flutter-app
          flutter analyze

      - name: Run tests
        run: |
          cd flutter-app
          flutter test
